services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: discord_clone_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: discord_clone
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Simple Backend Server
  backend:
    build:
      context: ./simple-server
      dockerfile: Dockerfile
    container_name: discord_clone_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - JWT_SECRET=your-super-secret-jwt-key-change-this-in-production
      - JWT_EXPIRES_IN=7d
      - DATABASE_URL=postgresql://postgres:postgres123@postgres:5432/discord_clone
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=discord_clone
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres123
    volumes:
      - ./simple-server:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      postgres:
        condition: service_healthy

  # Frontend (existing)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: discord_clone_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3001
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - backend

volumes:
  postgres_data:
